<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — PMR Wira SMK IBG 3</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <!-- Background grid dekoratif -->
  <div class="auth-grid-bg"></div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Login Card -->
  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">🏥</div>
        <h1>PMR Wira SMK IBG 3</h1>
        <p>Sistem Manajemen Organisasi PMR</p>
      </div>

      <div class="auth-divider"></div>

      <!-- Error Alert -->
      <div class="auth-error" id="auth-error">
        <span>⚠</span>
        <span id="auth-error-text">Email atau password salah.</span>
      </div>

      <!-- Form Login -->
      <form class="auth-form" id="login-form" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-control"
            type="email"
            id="email"
            name="email"
            placeholder="email@pmrsmkibg3.sch.id"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-password-wrap">
            <input
              class="form-control"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Tampilkan password">
              👁
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="btn-login">
          <span class="btn-spinner"></span>
          <span class="btn-text">Masuk</span>
        </button>

      </form>

      <!-- Footer info -->
      <div class="auth-footer">
        <strong>PMR Wira SMK IBG 3</strong>
        Hubungi administrator untuk mendapatkan akses.<br/>
        &copy; 2026 PMR Wira SMK IBG 3
      </div>

    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Config Supabase -->
  <script src="js/supabase.js"></script>
  <!-- Auth logic -->
  <script src="js/auth.js"></script>

</body>
</html>
